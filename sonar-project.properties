sonar.projectKey=iservice-api-key
sonar.projectName=Iservice
sonar.projectVersion=0.0.1

sonar.sources=src
sonar.sources.inclusions=**/*.ts
sonar.exclusions=**/node_modules/**, **/dist/**, **/*.spec.ts, test/**

sonar.scm.provider=git
sonar.sourceEncoding=UTF-8

sonar.tests=src
sonar.test.inclusions=**/*.spec.ts
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.projectVersion=0.1.0

# Diretório base do código-fonte (relativo ao sonar-project.properties)
sonar.sources=src
# Arquivos a serem ignorados da análise (arquivos de teste, arquivos de módulo, main, etc)
sonar.exclusions=**/*.spec.ts, src/main.ts, src/**/*.module.ts, src/database/migrations/**

# Linguagem (TypeScript)
sonar.language=ts

# Provedor SCM
sonar.scm.provider=git

# Encoding
sonar.sourceEncoding=UTF-8

# Testes e Cobertura (Coverage)
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Caminho para o relatório de cobertura gerado pelo Jest (lcov.info)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
